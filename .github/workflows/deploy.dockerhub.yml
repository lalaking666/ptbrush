name: Publish to Docker Hub

on:
  release:
    types: [published] # 仅在 GitHub 上发布新 Release 时触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Write version from release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "$VERSION" > ptbrush/VERSION
          echo "Updated ptbrush/VERSION to $VERSION"
          # 同步更新 pyproject.toml 的版本
          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          echo "Updated pyproject.toml version to $VERSION"

      - name: Build Docker image
        run: |
          docker build -t huihuidehui/ptbrush:${{ github.event.release.tag_name }} .
          docker tag huihuidehui/ptbrush:${{ github.event.release.tag_name }} huihuidehui/ptbrush:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v1
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Push Docker image to Docker Hub
        run: |
          docker push huihuidehui/ptbrush:latest
          docker push huihuidehui/ptbrush:${{ github.event.release.tag_name }}
